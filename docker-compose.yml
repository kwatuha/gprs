version: '3.8'
services:
  nginx_proxy:
    image: nginx:alpine
    container_name: gov_nginx_proxy
    restart: always
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - api

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gov_react_frontend
    restart: always
    ports:
      - "5176:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
    command: npm run dev
    # Remove VITE_API_URL - let .env.development handle it
    # environment:
    #   VITE_API_URL: /api  # Uses vite.config.js proxy to api:3000

  public-dashboard:
    build:
      context: ./public-dashboard
      dockerfile: Dockerfile
    container_name: gov_public_dashboard
    restart: always
    ports:
      - "5177:5173"
    volumes:
      - ./public-dashboard:/app
      - /app/node_modules
    depends_on:
      - api
    command: npm run dev
    environment:
      - VITE_API_URL=/api
      - VITE_MAPS_API_KEY=AIzaSyArNdYrq_WsuoGc34C7Osua7kbpt2Twf_s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: gov_node_api
    restart: always
    ports:
      - "3010:3000"
    volumes:
      - ./api:/app
      - /app/node_modules
    depends_on:
      postgres_db:
        condition: service_healthy
    environment:
      # PostgreSQL connection (primary)
      DB_TYPE: postgresql
      DB_HOST: postgres_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: government_projects
      DB_PORT: 5432
      # MySQL connection (for migration only - can be removed after migration)
      MYSQL_HOST: mysql_db
      MYSQL_USER: impesUser
      MYSQL_PASSWORD: Admin2010impes
      MYSQL_DATABASE: gov_imbesdb
      MYSQL_PORT: 3306
      NODE_ENV: development
    command: npm run dev

  # PostgreSQL database (primary)
  postgres_db:
    image: postgres:16-alpine
    container_name: gov_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: government_projects
    volumes:
      - gov_postgres_data:/var/lib/postgresql/data
      - ./scripts/migration/init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # MySQL database (for migration - can be removed after migration)
  mysql_db:
    image: mysql:8.0
    container_name: gov_db
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: gov_imbesdb
      MYSQL_USER: impesUser
      MYSQL_PASSWORD: Admin2010impes
    volumes:
      - ./api/init.sql:/docker-entrypoint-initdb.d/init.sql
      - gov_db_data:/var/lib/mysql
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  gov_db_data:
  gov_postgres_data: